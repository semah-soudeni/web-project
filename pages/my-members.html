<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Members | Club Administration</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/my-members.css">
</head>

<body>
    <nav class="navigation">
        <div class="nav-container">
            <div class="nav-menu">
                <a href="../index.html" class="nav-link">Clubs</a>
                <a href="events.html" class="nav-link">Events</a>
                <a href="map.html" class="nav-link">Map</a>
                <a href="admin.html" class="nav-link">Admin Dashboard</a>
            </div>
            <div class="nav-login">
                <button id="nav-signin-btn" onclick="window.location.href='signin.html'" class="signin-btn">Sign
                    In</button>
                <button id="nav-signup-btn" onclick="window.location.href='signup.html'" class="signup-btn">Sign
                    Up</button>
                <div id="nav-user-area" style="display:none;">
                    <span id="nav-user-name"></span>
                    <button id="nav-logout-btn">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="dashboard-container">
        <header class="dashboard-header">
            <div class="header-text">
                <h1 id="club-title">Club Membership Roster</h1>
                <p id="admin-badge">Administrative View</p>
            </div>
            <div class="header-stats">
                <div class="stat-card">
                    <span class="stat-value" id="member-count">0</span>
                    <span class="stat-label">Total Members</span>
                </div>
            </div>
        </header>

        <section class="members-section">
            <div class="table-container">
                <table id="members-table">
                    <thead>
                        <tr>
                            <th>Student Name</th>
                            <th>Email</th>
                            <th>Role</th>
                            <th>Joined Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="members-body">
                        <!-- Loaded via JS -->
                        <tr>
                            <td colspan="5" class="loading">Fetching roster...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- Promotion Modal -->
    <div id="promote-modal" class="modal">
        <div class="modal-content">
            <h2 id="modal-title">Manage Membership</h2>
            <p id="modal-subtitle">Assign a new role to this student</p>
            <div id="tenure-badge" class="tenure-badge"></div>

            <form id="promote-form">
                <input type="hidden" id="target-user-id">
                <div class="role-grid">
                    <label class="role-option">
                        <input type="radio" name="target-role" value="member">
                        <div class="role-card">
                            <span class="role-name">Member</span>
                            <span class="role-desc">General active student</span>
                        </div>
                    </label>
                    <label class="role-option exec-role" id="opt-president">
                        <input type="radio" name="target-role" value="president">
                        <div class="role-card">
                            <span class="role-name">President</span>
                            <span class="role-desc">Club Leader</span>
                        </div>
                    </label>
                    <label class="role-option exec-role" id="opt-vpa">
                        <input type="radio" name="target-role" value="vpa">
                        <div class="role-card">
                            <span class="role-name">VPA</span>
                            <span class="role-desc">Admin Vice-President</span>
                        </div>
                    </label>
                    <label class="role-option exec-role" id="opt-vpt">
                        <input type="radio" name="target-role" value="vpt">
                        <div class="role-card">
                            <span class="role-name">VPT</span>
                            <span class="role-desc">Technical Vice-President</span>
                        </div>
                    </label>
                </div>
                <div class="modal-actions">
                    <button type="button" class="cancel-btn" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="save-btn" id="save-role-btn">Apply Changes</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../assets/js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const modal = document.getElementById('promote-modal');
            const form = document.getElementById('promote-form');

            // Wait for auth.js to load user data
            const checkUser = setInterval(() => {
                if (window.currentUser) {
                    clearInterval(checkUser);
                    loadMembers();
                    const clubName = window.currentUser.club_name || 'Club';
                    document.getElementById('club-title').textContent = `${clubName} | Member Roster`;
                    const roleLabel = window.currentUser.role.toUpperCase();
                    document.getElementById('admin-badge').textContent = `System: ${roleLabel}`;
                }
            }, 100);

            function loadMembers() {
                fetch('../backend/get_members.php')
                    .then(r => r.json())
                    .then(data => {
                        const body = document.getElementById('members-body');
                        const countEl = document.getElementById('member-count');

                        if (data.error) {
                            body.innerHTML = `<tr><td colspan="5" class="error">${data.error}</td></tr>`;
                            return;
                        }

                        if (!data.members || data.members.length === 0) {
                            body.innerHTML = `<tr><td colspan="5" class="empty">No students have joined yet.</td></tr>`;
                            countEl.textContent = '0';
                            return;
                        }

                        countEl.textContent = data.members.length;
                        body.innerHTML = data.members.map(m => {
                            const joinedDate = new Date(m.joined_at);
                            const now = new Date();
                            const diffDays = Math.floor((now - joinedDate) / (1000 * 60 * 60 * 24));
                            const isEligible = diffDays >= 365;

                            let roleDisplay = m.role.toUpperCase();
                            if (m.role === 'vpa') roleDisplay = 'VP (Admin)';
                            if (m.role === 'vpt') roleDisplay = 'VP (Tech)';

                            return `
                            <tr>
                                <td class="name-cell">${m.first_name} ${m.last_name}</td>
                                <td>${m.email}</td>
                                <td><span class="role-tag ${m.role}">${roleDisplay}</span></td>
                                <td class="date-cell">${joinedDate.toLocaleDateString()}</td>
                                <td>
                                    <button class="manage-btn" onclick="openModal(${m.user_id}, '${m.first_name} ${m.last_name}', '${m.role}', ${diffDays})">
                                        Manage
                                    </button>
                                </td>
                            </tr>
                        `}).join('');
                    })
                    .catch(() => {
                        document.getElementById('members-body').innerHTML = `<tr><td colspan="5" class="error">Failed to connect to server.</td></tr>`;
                    });
            }

            window.openModal = (userId, name, currentRole, tenure) => {
                document.getElementById('target-user-id').value = userId;
                document.getElementById('modal-title').textContent = `Manage: ${name}`;

                const badge = document.getElementById('tenure-badge');
                const isEligible = tenure >= 365;

                badge.textContent = `Tenure: ${tenure} days / ${isEligible ? 'Eligible for Executive Roles' : 'Ineligible (< 1 year)'}`;
                badge.className = `tenure-badge ${isEligible ? 'eligible' : 'locked'}`;

                // Mark current role
                form.querySelector(`input[value="${currentRole}"]`).checked = true;

                // Disable executive options if not eligible
                const execOptions = document.querySelectorAll('.exec-role');
                execOptions.forEach(opt => {
                    const radio = opt.querySelector('input');
                    if (!isEligible) {
                        opt.classList.add('disabled');
                        radio.disabled = true;
                    } else {
                        opt.classList.remove('disabled');
                        radio.disabled = false;
                    }
                });

                modal.classList.add('active');
            };

            window.closeModal = () => {
                modal.classList.remove('active');
            };

            form.addEventListener('submit', (e) => {
                e.preventDefault();
                const userId = document.getElementById('target-user-id').value;
                const roleInput = form.querySelector('input[name="target-role"]:checked');
                if (!roleInput) return;
                const role = roleInput.value;
                const saveBtn = document.getElementById('save-role-btn');

                saveBtn.disabled = true;
                saveBtn.textContent = 'Saving...';

                fetch('../backend/update_membership.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId, role: role })
                })
                    .then(r => r.json())
                    .then(data => {
                        if (data.success) {
                            closeModal();
                            loadMembers();
                        } else {
                            alert(data.error || 'Failed to update role.');
                        }
                    })
                    .catch(() => alert('Network error.'))
                    .finally(() => {
                        saveBtn.disabled = false;
                        saveBtn.textContent = 'Apply Changes';
                    });
            });
        });
    </script>
</body>

</html>
