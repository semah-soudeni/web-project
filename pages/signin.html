<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In</title>
  <link rel="stylesheet" href="../assets/css/signin.css" />
  <style>
    .error-banner {
      background: rgba(239, 68, 68, 0.1);
      color: #ef4444;
      border: 1px solid rgba(239, 68, 68, 0.2);
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 16px;
      font-size: .9rem;
      display: none;
    }

    .success-banner {
      background: rgba(16, 185, 129, 0.1);
      color: #10b981;
      border: 1px solid rgba(16, 185, 129, 0.2);
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 16px;
      font-size: .9rem;
      display: none;
    }

    .primary-btn:disabled {
      opacity: .6;
      cursor: not-allowed;
    }
  </style>
</head>

<body>

  <a href="../index.html" class="back-btn" aria-label="Go back">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <path d="M15 18l-6-6 6-6" />
    </svg>
    Back
  </a>

  <div class="container">

    <!-- LEFT -->
    <div class="auth-left">
      <div class="auth-card">

        <h1>Welcome Back</h1>
        <p>Sign in to continue your academic journey</p>

        <div class="error-banner" id="errorBanner"></div>
        <div class="success-banner" id="successBanner">Signed in! Redirecting…</div>

        <form id="signinForm" novalidate>
          <div class="form-group">
            <label for="email">Email Address *</label>
            <input type="email" id="email" name="email" placeholder="you@insat.ucar.tn" required autocomplete="email" />
          </div>

          <div class="form-group">
            <label for="password">Password *</label>
            <input type="password" id="password" name="password" placeholder="Enter your password" required
              autocomplete="current-password" />
          </div>

          <button type="submit" class="primary-btn" id="signinBtn">Sign In</button>
        </form>

        <div class="auth-footer">
          Don't have an account? <a href="signup.html">Create one</a>
        </div>

      </div>
    </div>

    <!-- RIGHT -->
    <div class="auth-right">
      <div class="image-content">
        <h2>Welcome Back</h2>
        <p>Access clubs, events, and your student community all in one place.</p>
        <div class="features">
          <span>✔ Secure Access</span>
          <span>✔ Verified Students</span>
        </div>
      </div>
    </div>

  </div>

  <script>
    (function () {
      const form = document.getElementById('signinForm');
      const errorBanner = document.getElementById('errorBanner');
      const successBanner = document.getElementById('successBanner');
      const btn = document.getElementById('signinBtn');

      // Where to go after login (supports ?redirect= param)
      function getRedirect() {
        const params = new URLSearchParams(window.location.search);
        return params.get('redirect') || '../index.html';
      }

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        errorBanner.style.display = 'none';

        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        if (!email || !password) {
          errorBanner.textContent = 'Please fill in all fields.';
          errorBanner.style.display = 'block';
          return;
        }

        btn.disabled = true;
        btn.textContent = 'Signing in…';

        fetch('../backend/login.php', {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        })
          .then(function (r) { return r.json(); })
          .then(function (data) {
            if (data.success) {
              successBanner.style.display = 'block';
              setTimeout(function () {
                window.location.href = getRedirect();
              }, 800);
            } else {
              errorBanner.textContent = data.error || 'Sign in failed. Please try again.';
              errorBanner.style.display = 'block';
              btn.disabled = false;
              btn.textContent = 'Sign In';
            }
          })
          .catch(function () {
            errorBanner.textContent = 'Network error. Please try again.';
            errorBanner.style.display = 'block';
            btn.disabled = false;
            btn.textContent = 'Sign In';
          });
      });
    })();
  </script>

</body>

</html>
